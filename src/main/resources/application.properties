spring.application.name=mysawit-payroll-service
server.port=8085

# --- Supabase Database Configuration ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# CORS Configuration
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

# Wallet and sandbox payment boundary
wallet.sawit-dollar-rate-idr=${SAWIT_DOLLAR_RATE_IDR:10000}

# RabbitMQ event integration
spring.rabbitmq.addresses=${CLOUDAMQP_URL:amqp://${RABBITMQ_USERNAME:guest}:${RABBITMQ_PASSWORD:guest}@${RABBITMQ_HOST:localhost}:${RABBITMQ_PORT:5672}/}
payroll.rabbitmq.queues.harvest=${PAYROLL_HARVEST_QUEUE:payroll_queue}
payroll.rabbitmq.queues.shipment-supir=${PAYROLL_SHIPMENT_SUPIR_QUEUE:payroll.shipment.supir.queue}
payroll.rabbitmq.queues.shipment-mandor=${PAYROLL_SHIPMENT_MANDOR_QUEUE:payroll.shipment.mandor.queue}
