spring.application.name=mysawit-payroll-service
server.port=8085

# --- Supabase Database Configuration ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# CORS Configuration
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

# RabbitMQ Integration
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
payroll.rabbitmq.queues.user-registered=${USER_REGISTERED_QUEUE:user.registered.queue}
payroll.rabbitmq.queues.harvest=${HARVEST_PAYROLL_QUEUE:payroll_queue}
payroll.rabbitmq.queues.shipment=${SHIPMENT_COMPLETED_QUEUE:shipment.completed}
