spring.application.name=mysawit-payroll-service
server.port=8085

# --- Supabase Database Configuration ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# CORS Configuration
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.rabbit.enabled=${RABBITMQ_HEALTH_ENABLED:false}

# RabbitMQ Integration
spring.rabbitmq.addresses=${CLOUDAMQP_URL:}
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
payroll.rabbitmq.queues.user-registered=${USER_REGISTERED_QUEUE:user.registered.queue}
payroll.rabbitmq.queues.harvest=${HARVEST_PAYROLL_QUEUE:payroll_queue}
payroll.rabbitmq.queues.shipment=${SHIPMENT_COMPLETED_QUEUE:shipment.completed}
payroll.rabbitmq.dead-letter-exchange=${PAYROLL_DLX:payroll.dlx}
payroll.rabbitmq.retry.max-attempts=${PAYROLL_RABBITMQ_RETRY_MAX_ATTEMPTS:3}
payroll.rabbitmq.retry.initial-interval-ms=${PAYROLL_RABBITMQ_RETRY_INITIAL_INTERVAL_MS:1000}
payroll.rabbitmq.retry.multiplier=${PAYROLL_RABBITMQ_RETRY_MULTIPLIER:2.0}
payroll.rabbitmq.retry.max-interval-ms=${PAYROLL_RABBITMQ_RETRY_MAX_INTERVAL_MS:5000}

# Midtrans Snap sandbox payment integration for wallet top-up
midtrans.sandbox.enabled=${MIDTRANS_SANDBOX_ENABLED:true}
midtrans.sandbox.snap-base-url=${MIDTRANS_SNAP_BASE_URL:https://app.sandbox.midtrans.com}
midtrans.sandbox.merchant-id=${MIDTRANS_MERCHANT_ID:}
midtrans.sandbox.client-key=${MIDTRANS_CLIENT_KEY:}
midtrans.sandbox.server-key=${MIDTRANS_SERVER_KEY:}
midtrans.sandbox.finish-redirect-url=${MIDTRANS_FINISH_REDIRECT_URL:http://localhost:3000/admin/payroll?topUp=finish}
midtrans.sandbox.expiry-duration-minutes=${MIDTRANS_EXPIRY_DURATION_MINUTES:1440}
