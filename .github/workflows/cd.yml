name: CD - Deploy Payroll to AWS

on:
  push:
    branches: [staging, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: payroll-cd-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}
    steps:
      - name: Validate Docker Hub secrets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          test -n "${DOCKERHUB_USERNAME:-}" || (echo "::error::Missing DOCKERHUB_USERNAME" && exit 1)
          test -n "${DOCKERHUB_TOKEN:-}" || (echo "::error::Missing DOCKERHUB_TOKEN" && exit 1)

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        run: |
          set -euo pipefail
          echo "image-tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mysawit-payroll-service:${{ steps.meta.outputs.image-tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/mysawit-payroll-service:latest
          labels: |
            com.mysawit.service=mysawit-payroll-service
            com.mysawit.release=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy Payroll to EC2
    needs: build-push
    runs-on: ubuntu-latest
    env:
      AWS_HOST: ${{ secrets.AWS_HOST }}
      AWS_USER: ${{ secrets.AWS_USER }}
      AWS_SSH_KEY: ${{ secrets.AWS_SSH_KEY }}
      AWS_SSH_PORT: ${{ vars.AWS_SSH_PORT || '22' }}
      SSH_CONNECT_TIMEOUT: ${{ vars.SSH_CONNECT_TIMEOUT || '60' }}
      AWS_REGION: ${{ vars.AWS_REGION || secrets.AWS_REGION || 'us-east-1' }}
      AWS_SECURITY_GROUP_ID: ${{ secrets.AWS_SECURITY_GROUP_ID || vars.AWS_SECURITY_GROUP_ID }}
      HAS_AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY_ID != '' && 'true' || 'false' }}
      HAS_AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY != '' && 'true' || 'false' }}
      PAYROLL_SERVICE_PORT: ${{ vars.PAYROLL_SERVICE_PORT || '8085' }}
      IMAGE_REF: ${{ secrets.DOCKERHUB_USERNAME }}/mysawit-payroll-service:${{ needs.build-push.outputs.image-tag }}
      DEPLOY_DIR: ${{ vars.PAYROLL_DEPLOY_DIR || '/opt/mysawit-payroll-service' }}
    steps:
      - name: Validate deployment secrets
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          RABBITMQ_HOST: ${{ secrets.RABBITMQ_HOST }}
          RABBITMQ_USERNAME: ${{ secrets.RABBITMQ_USERNAME }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
        run: |
          set -euo pipefail
          missing=()
          for key in AWS_HOST AWS_USER AWS_SSH_KEY DB_URL DB_USERNAME DB_PASSWORD RABBITMQ_HOST RABBITMQ_USERNAME RABBITMQ_PASSWORD; do
            if [ -z "${!key:-}" ]; then
              missing+=("$key")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required deployment secrets: ${missing[*]}"
            exit 1
          fi
          if [[ "${DB_URL}" != jdbc:postgresql://* ]]; then
            echo "::error::DB_URL must be a PostgreSQL JDBC URL"
            exit 1
          fi

      - name: Prepare SSH key
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s' "$AWS_SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa >/dev/null
          ssh-keyscan -T "$SSH_CONNECT_TIMEOUT" -p "$AWS_SSH_PORT" -H "$AWS_HOST" >> ~/.ssh/known_hosts || true

      - name: Configure AWS credentials for SSH ingress
        if: env.HAS_AWS_ACCESS_KEY == 'true' && env.HAS_AWS_SECRET_KEY == 'true' && env.AWS_SECURITY_GROUP_ID != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Allow runner SSH ingress
        id: ssh_ingress
        if: env.HAS_AWS_ACCESS_KEY == 'true' && env.HAS_AWS_SECRET_KEY == 'true' && env.AWS_SECURITY_GROUP_ID != ''
        run: |
          set -euo pipefail
          RUNNER_IP="$(curl -fsS https://checkip.amazonaws.com | tr -d '[:space:]')"
          if [[ ! "$RUNNER_IP" =~ ^[0-9]+(\.[0-9]+){3}$ ]]; then
            echo "::error::Could not determine GitHub runner public IPv4 address"
            exit 1
          fi
          RUNNER_CIDR="${RUNNER_IP}/32"
          echo "runner-cidr=${RUNNER_CIDR}" >> "$GITHUB_OUTPUT"
          if aws ec2 authorize-security-group-ingress \
            --group-id "$AWS_SECURITY_GROUP_ID" \
            --ip-permissions "[{\"IpProtocol\":\"tcp\",\"FromPort\":${AWS_SSH_PORT},\"ToPort\":${AWS_SSH_PORT},\"IpRanges\":[{\"CidrIp\":\"${RUNNER_CIDR}\",\"Description\":\"GitHub Actions payroll deploy ${GITHUB_RUN_ID}\"}]}]"; then
            echo "opened=true" >> "$GITHUB_OUTPUT"
            echo "Temporarily allowed SSH from this runner."
          else
            echo "Ingress rule may already exist; continuing with SSH attempt."
            echo "opened=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify SSH reachability
        run: |
          set -euo pipefail
          if timeout "$SSH_CONNECT_TIMEOUT" bash -c "cat < /dev/null > /dev/tcp/${AWS_HOST}/${AWS_SSH_PORT}" 2>/dev/null; then
            echo "EC2 SSH port is reachable from this runner."
            exit 0
          fi
          echo "::error::GitHub runner cannot reach ${AWS_HOST}:${AWS_SSH_PORT}. Allow this runner IP in the EC2 security group, or configure AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION, and AWS_SECURITY_GROUP_ID so this workflow can add a temporary SSH rule."
          exit 1

      - name: Upload deployment env file
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HEALTH_ENABLED: ${{ vars.DB_HEALTH_ENABLED || 'false' }}
          DB_CONNECTION_TIMEOUT_MS: ${{ vars.DB_CONNECTION_TIMEOUT_MS || '5000' }}
          DB_VALIDATION_TIMEOUT_MS: ${{ vars.DB_VALIDATION_TIMEOUT_MS || '3000' }}
          RABBITMQ_HOST: ${{ secrets.RABBITMQ_HOST }}
          RABBITMQ_PORT: ${{ vars.RABBITMQ_PORT || '5672' }}
          RABBITMQ_USERNAME: ${{ secrets.RABBITMQ_USERNAME }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          RABBITMQ_HEALTH_ENABLED: ${{ vars.RABBITMQ_HEALTH_ENABLED || 'false' }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
        run: |
          set -euo pipefail
          sanitize_single_line() {
            local key="$1"
            local value="$2"
            if [[ "$value" == *$'\n'* || "$value" == *$'\r'* ]]; then
              echo "::error::${key} must be single-line"
              exit 1
            fi
          }
          for key in DB_URL DB_USERNAME DB_PASSWORD DB_HEALTH_ENABLED DB_CONNECTION_TIMEOUT_MS DB_VALIDATION_TIMEOUT_MS RABBITMQ_HOST RABBITMQ_PORT RABBITMQ_USERNAME RABBITMQ_PASSWORD RABBITMQ_HEALTH_ENABLED CORS_ORIGINS; do
            sanitize_single_line "$key" "${!key:-}"
          done

          {
            printf 'DB_URL=%s\n' "$DB_URL"
            printf 'DB_USERNAME=%s\n' "$DB_USERNAME"
            printf 'DB_PASSWORD=%s\n' "$DB_PASSWORD"
            printf 'DB_HEALTH_ENABLED=%s\n' "$DB_HEALTH_ENABLED"
            printf 'DB_CONNECTION_TIMEOUT_MS=%s\n' "$DB_CONNECTION_TIMEOUT_MS"
            printf 'DB_VALIDATION_TIMEOUT_MS=%s\n' "$DB_VALIDATION_TIMEOUT_MS"
            printf 'RABBITMQ_HOST=%s\n' "$RABBITMQ_HOST"
            printf 'RABBITMQ_PORT=%s\n' "$RABBITMQ_PORT"
            printf 'RABBITMQ_USERNAME=%s\n' "$RABBITMQ_USERNAME"
            printf 'RABBITMQ_PASSWORD=%s\n' "$RABBITMQ_PASSWORD"
            printf 'RABBITMQ_HEALTH_ENABLED=%s\n' "$RABBITMQ_HEALTH_ENABLED"
            printf 'CORS_ORIGINS=%s\n' "${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}"
          } > payroll.env
          chmod 600 payroll.env

          SSH_OPTS="-i ~/.ssh/id_rsa -o IdentitiesOnly=yes -o BatchMode=yes -o ConnectTimeout=$SSH_CONNECT_TIMEOUT -o ServerAliveInterval=15 -o ServerAliveCountMax=4 -o StrictHostKeyChecking=accept-new -p $AWS_SSH_PORT"
          SCP_OPTS="-i ~/.ssh/id_rsa -o IdentitiesOnly=yes -o BatchMode=yes -o ConnectTimeout=$SSH_CONNECT_TIMEOUT -o ServerAliveInterval=15 -o ServerAliveCountMax=4 -o StrictHostKeyChecking=accept-new -P $AWS_SSH_PORT"
          for attempt in $(seq 1 5); do
            if ssh $SSH_OPTS "$AWS_USER@$AWS_HOST" "sudo mkdir -p '$DEPLOY_DIR' && sudo chown '$AWS_USER':'$AWS_USER' '$DEPLOY_DIR'" &&
               scp $SCP_OPTS payroll.env "$AWS_USER@$AWS_HOST:$DEPLOY_DIR/payroll.env"; then
              exit 0
            fi
            echo "SSH upload failed; retrying (${attempt}/5)"
            sleep 10
          done
          echo "::error::Could not upload payroll.env to EC2 over SSH"
          exit 1

      - name: Restart payroll container on EC2
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/id_rsa -o IdentitiesOnly=yes -o BatchMode=yes -o ConnectTimeout=$SSH_CONNECT_TIMEOUT -o ServerAliveInterval=15 -o ServerAliveCountMax=4 -o StrictHostKeyChecking=accept-new -p $AWS_SSH_PORT"
          ssh $SSH_OPTS "$AWS_USER@$AWS_HOST" "
            set -euo pipefail
            if docker info >/dev/null 2>&1; then DOCKER=docker; else DOCKER='sudo docker'; fi
            \$DOCKER pull '$IMAGE_REF'
            \$DOCKER rm -f mysawit-payroll-service >/dev/null 2>&1 || true
            \$DOCKER run -d \
              --name mysawit-payroll-service \
              --env-file '$DEPLOY_DIR/payroll.env' \
              --restart unless-stopped \
              -p '$PAYROLL_SERVICE_PORT:8085' \
              --log-opt max-size=10m \
              --log-opt max-file=5 \
              '$IMAGE_REF'
          "

      - name: Verify public health endpoint
        run: |
          set -euo pipefail
          HEALTH_URL="http://${AWS_HOST}:${PAYROLL_SERVICE_PORT}/actuator/health/liveness"
          for attempt in $(seq 1 18); do
            if curl -fsS --connect-timeout 5 --max-time 10 "$HEALTH_URL"; then
              echo "Payroll deployment is healthy at ${HEALTH_URL}"
              exit 0
            fi
            echo "Payroll health is not ready yet; retrying (${attempt}/18)"
            sleep 5
          done
          echo "::error::Payroll health endpoint is not reachable at ${HEALTH_URL}"
          exit 1

      - name: Fetch deployment diagnostics on failure
        if: failure() && env.AWS_HOST != '' && env.AWS_USER != ''
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/id_rsa -o IdentitiesOnly=yes -o BatchMode=yes -o ConnectTimeout=$SSH_CONNECT_TIMEOUT -o ServerAliveInterval=15 -o ServerAliveCountMax=4 -o StrictHostKeyChecking=accept-new -p $AWS_SSH_PORT"
          ssh $SSH_OPTS "$AWS_USER@$AWS_HOST" "(docker ps -a || sudo docker ps -a || true); (docker logs --tail 250 mysawit-payroll-service || sudo docker logs --tail 250 mysawit-payroll-service || true)"

      - name: Revoke runner SSH ingress
        if: always() && steps.ssh_ingress.outputs.opened == 'true' && steps.ssh_ingress.outputs['runner-cidr'] != '' && env.AWS_SECURITY_GROUP_ID != ''
        run: |
          set -euo pipefail
          aws ec2 revoke-security-group-ingress \
            --group-id "$AWS_SECURITY_GROUP_ID" \
            --protocol tcp \
            --port "$AWS_SSH_PORT" \
            --cidr "${{ steps.ssh_ingress.outputs['runner-cidr'] }}" || true
