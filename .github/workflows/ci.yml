name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
      - staging

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-coverage:
    runs-on: ubuntu-latest
    env:
      DB_URL: jdbc:postgresql://localhost:5432/mysawit_payroll
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: localhost
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: mysawit_payroll
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mysawit_payroll"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with: 
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Check, test, and coverage
        run: ./gradlew --no-daemon clean check jacocoTestReport jacocoTestCoverageVerification

      - name: Build boot jar
        run: ./gradlew --no-daemon bootJar

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: payroll-ci-reports
          path: |
            build/reports
            build/test-results
            build/libs/*.jar

  docker-build:
    runs-on: ubuntu-latest
    needs: build-test-coverage
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: mysawit-payroll-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  sonar:
    runs-on: ubuntu-latest
    needs: build-test-coverage
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make Gradle wrapper executable
        if: env.SONAR_TOKEN != '' && env.SONAR_PROJECT_KEY != '' && env.SONAR_ORGANIZATION != ''
        run: chmod +x ./gradlew

      - name: Generate coverage report for SonarCloud
        if: env.SONAR_TOKEN != '' && env.SONAR_PROJECT_KEY != '' && env.SONAR_ORGANIZATION != ''
        run: ./gradlew --no-daemon test jacocoTestReport

      - name: SonarCloud Scan
        if: env.SONAR_TOKEN != '' && env.SONAR_PROJECT_KEY != '' && env.SONAR_ORGANIZATION != ''
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.sources=src/main
            -Dsonar.tests=src/test
            -Dsonar.java.binaries=build/classes
            -Dsonar.junit.reportPaths=build/test-results/test
            -Dsonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml

      - name: Fail if SonarCloud Quality Gate fails
        if: github.event_name == 'push' && github.ref_name == 'main'
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import json
          import os
          import time
          import urllib.error
          import urllib.request

          token = os.environ["SONAR_TOKEN"]
          report_file = ".scannerwork/report-task.txt"

          if not os.path.exists(report_file):
              raise SystemExit(".scannerwork/report-task.txt not found after Sonar scan")

          with open(report_file, "r", encoding="utf-8") as f:
              props = dict(line.strip().split("=", 1) for line in f if "=" in line)

          ce_task_url = props.get("ceTaskUrl")
          if not ce_task_url:
              raise SystemExit("ceTaskUrl missing in .scannerwork/report-task.txt")

          def get(url: str):
              req = urllib.request.Request(url)
              auth = base64.b64encode((token + ":").encode()).decode()
              req.add_header("Authorization", "Basic " + auth)
              try:
                  with urllib.request.urlopen(req) as resp:
                      return json.loads(resp.read().decode())
              except urllib.error.HTTPError as err:
                  body = err.read().decode("utf-8", "ignore")
                  raise SystemExit(f"HTTP error {err.code} from {url}: {body}")

          analysis_id = None
          for _ in range(60):
              data = get(ce_task_url)
              status = data["task"]["status"]
              print("Sonar CE status:", status)
              if status == "SUCCESS":
                  analysis_id = data["task"].get("analysisId")
                  break
              if status in ("PENDING", "IN_PROGRESS"):
                  time.sleep(5)
                  continue
              raise SystemExit(f"Unexpected Sonar CE status: {status}")

          if not analysis_id:
              raise SystemExit("analysisId not found; Sonar task may not have finished")

          qg = get(f"https://sonarcloud.io/api/qualitygates/project_status?analysisId={analysis_id}")
          project_status = qg["projectStatus"]
          qg_status = project_status["status"]
          print("Quality Gate:", qg_status)
          if qg_status != "OK":
              raise SystemExit("Quality Gate failed")
          PY

      - name: Skip SonarCloud when configuration is absent
        if: env.SONAR_TOKEN == '' || env.SONAR_PROJECT_KEY == '' || env.SONAR_ORGANIZATION == ''
        run: echo "SonarCloud skipped because SONAR_TOKEN, SONAR_PROJECT_KEY, or SONAR_ORGANIZATION is not configured."
